name: Gitea
services:
  Gitea:
    container_name: Gitea
    image: docker.gitea.com/gitea:1.25.5-rootless@sha256:be0b89adf2fc8657df508303d919c3be33e6413605882919f702177d62960c9a
    restart: unless-stopped
    networks:
      - Gitea
      - GiteaDB
      - GiteaCache
    ports:
      - "2222:2222"
    environment:
      - APP_NAME=${APP_NAME}
      - GITEA__server__ROOT_URL=${ROOT_URL}
      - GITEA__server__START_SSH_SERVER=true
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=GiteaDB:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=${DB_USER}
      - GITEA__database__PASSWD=${DB_PASSWORD}
      - GITEA__mailer__ENABLED=true
      - GITEA__mailer__PROTOCOL=smtps
      - GITEA__mailer__SMTP_ADDR=${SMTP_HOST}
      - GITEA__mailer__SMTP_PORT=${SMTP_PORT}
      - GITEA__mailer__USER=${SMTP_USER}
      - GITEA__mailer__PASSWD=${SMTP_PASSWORD}
      - GITEA__mailer__FROM=${SMTP_FROM}
      - GITEA__mailer__FROM_DISPLAY_NAME_FORMAT='{{ .DisplayName }} (by {{ .AppName }})'
      - GITEA__mailer__SUBJECT_PREFIX=[Gitea]
      - GITEA__webhook__ALLOWED_HOST_LIST=${WEBHOOK_ALLOWED_HOST_LIST}
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__ENABLE_NOTIFY_MAIL=true
      - GITEA__service__ENABLE_BASIC_AUTHENTICATION=false
      - GITEA__service__REQUIRE_CAPTCHA_FOR_LOGIN=true
      - GITEA__service__DEFAULT_KEEP_EMAIL_PRIVATE=true
      - GITEA__security__REVERSE_PROXY_TRUSTED_PROXIES=172.16.0.0/16 # Change this as needed if using different subnet for Docker Networks
      - GITEA__cache__ADAPTER=redis
      - GITEA__cache__HOST=redis://GiteaCache:6379/0?pool_size=100&idle_timeout=180s
      - GITEA__actions__ZOMBIE_TASK_TIMEOUT=15m
      - GITEA__repository__ENABLE_PUSH_CREATE_USER=true
      - GITEA__webhook__DELIVER_TIMEOUT=60
    volumes:
      - ${DOCKER_VOLUMES}/Gitea/data:/var/lib/gitea
      - ${DOCKER_VOLUMES}/Gitea/config:/etc/gitea
      - /etc/localtime:/etc/localtime:ro

    depends_on:
      - GiteaDB
      - GiteaCache

    user: "${UID}:${GID}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/api/healthz || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 0.75
          memory: 512M
          pids: 100

  GiteaDB:
    container_name: GiteaDB
    image: postgres:18.3-alpine3.23@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    networks:
      - GiteaDB
    shm_size: 256M
    environment:
      - POSTGRES_DB=gitea
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ${DOCKER_VOLUMES}/Gitea/database:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro

    user: "${UID}:${GID}"
    read_only: true
    tmpfs:
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: pg_isready -U ${DB_USER} -d gitea || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
          pids: 50

  GiteaCache:
    container_name: GiteaCache
    image: redis:8.6.2-alpine3.23@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72
    restart: unless-stopped
    command: redis-server --save ""
    networks:
      - GiteaCache

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: 0.25
          memory: 256M
          pids: 30

networks:
  Gitea:
    name: Gitea
    external: true
  GiteaDB:
    name: GiteaDB
    external: true
  GiteaCache:
    name: GiteaCache
    external: true
